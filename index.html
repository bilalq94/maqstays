<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
:root{--ink:#0C0B09;--ink2:#141310;--ink3:#1E1C18;--ink4:#2A2820;--gold:#C9A96E;--gold2:#E8C98A;--gold3:#F5DFA8;--gold-dim:#7A6540;--cream:#F2EDE4;--cream2:#E8E0D2;--warm:#9A8B72;--warm2:#6A5E4A;--warm3:#3A342A;--green:#5A9E6F;--red:#C4574C;--blue:#4A7FA5;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--ink);font-family:'Outfit',sans-serif;font-weight:300;color:var(--cream);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
::selection{background:var(--gold);color:var(--ink);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}
input,select,textarea,button{font-family:'Outfit',sans-serif;}
@keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 0 0 rgba(201,169,110,.4)}50%{box-shadow:0 0 0 10px rgba(201,169,110,0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fa{animation:fadeUp .6s cubic-bezier(.22,.68,0,1.2) both;}
.fa1{animation-delay:.07s}.fa2{animation-delay:.14s}.fa3{animation-delay:.21s}.fa4{animation-delay:.28s}.fa5{animation-delay:.35s}
.serif{font-family:'DM Serif Display',serif;}
.mono{font-family:'JetBrains Mono',monospace;}
.btn-gold{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);padding:13px 28px;border:none;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:.04em;transition:all .25s;border-radius:3px;font-family:'Outfit',sans-serif;}
.btn-gold:hover{background:linear-gradient(135deg,var(--gold2),var(--gold3));transform:translateY(-1px);box-shadow:0 8px 30px rgba(201,169,110,.3);}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--cream);padding:13px 28px;border:1px solid rgba(201,169,110,.3);cursor:pointer;font-size:13px;font-weight:400;letter-spacing:.04em;transition:all .25s;border-radius:3px;font-family:'Outfit',sans-serif;}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.inp{width:100%;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid rgba(201,169,110,.15);border-radius:3px;color:var(--cream);font-size:14px;outline:none;transition:border-color .2s;font-family:'Outfit',sans-serif;}
.inp:focus{border-color:var(--gold);background:rgba(255,255,255,.06);}
.inp::placeholder{color:var(--warm2);}
.lbl{font-size:10px;color:var(--warm);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:7px;font-weight:500;}
.tag{display:inline-block;padding:4px 10px;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;border-radius:2px;}
.tg{background:rgba(201,169,110,.15);color:var(--gold2);border:1px solid rgba(201,169,110,.25);}
.tgn{background:rgba(90,158,111,.15);color:#7DC89A;border:1px solid rgba(90,158,111,.25);}
.tgb{background:rgba(74,127,165,.15);color:#6BAACC;border:1px solid rgba(74,127,165,.25);}
.tgw{background:rgba(154,139,114,.1);color:var(--warm);border:1px solid rgba(154,139,114,.2);}
.tgr{background:rgba(196,87,76,.12);color:#E88880;border:1px solid rgba(196,87,76,.25);}
.divr{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.15),transparent);}
.spinner{width:20px;height:20px;border:2px solid rgba(201,169,110,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
/* Photo grid */
.photo-grid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:4px;border-radius:8px;overflow:hidden;height:420px;}
.photo-grid-cell{background:linear-gradient(135deg,var(--ink2),var(--ink3));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer;transition:filter .2s;}
.photo-grid-cell:hover{filter:brightness(1.12);}
.photo-grid-cell:first-child{grid-row:1/3;}
/* Airbnb-style booking widget */
.book-widget{background:var(--ink2);border:1px solid rgba(201,169,110,.2);border-radius:12px;padding:24px;position:sticky;top:82px;box-shadow:0 8px 40px rgba(0,0,0,.4);}
/* Rating stars */
.stars{color:#FFD700;font-size:13px;letter-spacing:1px;}
/* Zillow-style stat pill */
.stat-pill{background:rgba(255,255,255,.04);border:1px solid rgba(201,169,110,.1);border-radius:8px;padding:16px 20px;text-align:center;}
/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s both;padding:20px;}
/* Amenity icon grid */
.amen-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.amen-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;font-size:13px;color:var(--warm);}
/* Review card */
.review-card{background:rgba(255,255,255,.03);border:1px solid rgba(201,169,110,.08);border-radius:8px;padding:18px 20px;}
/* Map placeholder */
.map-placeholder{background:linear-gradient(135deg,#0F1A0F,#0A1520,#1A1208);border-radius:8px;position:relative;overflow:hidden;border:1px solid rgba(201,169,110,.1);}
.map-pin{position:absolute;width:14px;height:14px;background:var(--gold);border-radius:50%;border:3px solid var(--ink);box-shadow:0 0 0 4px rgba(201,169,110,.3);}
/* Zillow price history bar */
.price-bar{height:48px;background:linear-gradient(to top,rgba(201,169,110,.3),rgba(201,169,110,.6));border-radius:2px 2px 0 0;position:relative;transition:height .3s;}
/* Hide date input calendar icon on some browsers */
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.6) sepia(1) saturate(0.5) hue-rotate(10deg);cursor:pointer;}
</style>
</head>

const fmt=n=>n>=1e6?`$${(n/1e6).toFixed(1)}M`:n>=1e3?`$${(n/1e3).toFixed(0)}K`:`$${n.toLocaleString()}`;

const calcPmt=(principal,rate,months)=>{
  if(!rate)return principal/months;
  const r=rate/100/12;
  return principal*(r*Math.pow(1+r,months))/(Math.pow(1+r,months)-1);
};

/* ── APP ── */
function App(){
  const[page,setPage]=useState("home");
  const[selP,setSelP]=useState(null);
  const[selS,setSelS]=useState(null);
  const[bookParams,setBookParams]=useState(null);
  const[buyer,setBuyer]=useState(null);
  const[purchases,setPurchases]=useState([]);
  const[bookings,setBookings]=useState([]);
  const go=p=>{setPage(p);window.scrollTo(0,0);};

  return(
    <div style={{minHeight:"100vh"}}>
      <Nav page={page} go={go} buyer={buyer} cnt={purchases.length+bookings.length}/>
      {page==="home"&&<Home go={go}/>}
      {page==="buy"&&<Browse onSel={p=>{setSelP(p);go("property");}}/>}
      {page==="property"&&selP&&<PropDetail p={selP} onBack={()=>go("buy")} onCheckout={()=>go("checkout")}/>}
      {page==="checkout"&&selP&&<Checkout p={selP} onComplete={d=>{setPurchases(prev=>[...prev,{...d,id:Date.now(),property:selP}]);if(!buyer)setBuyer({name:d.name,email:d.email});go("dashboard");}} onBack={()=>go("property")}/>}
      {page==="stays"&&<StaysBrowse onSel={s=>{setSelS(s);go("stay_detail");}}/>}
      {page==="stay_detail"&&selS&&<StayDetail s={selS} onBack={()=>go("stays")} onBook={(ci,co,gc,nights,tot)=>{setBookParams({ci,co,gc,nights,tot});go("stay_book");}}/>}
      {page==="stay_book"&&selS&&<StayBook s={selS} bp={bookParams} onComplete={d=>{setBookings(prev=>[...prev,{...d,id:Date.now(),stay:selS}]);if(!buyer)setBuyer({name:d.name,email:d.email});go("dashboard");}} onBack={()=>go("stay_detail")}/>}
      {page==="dashboard"&&<Dashboard purchases={purchases} bookings={bookings} buyer={buyer} go={go}/>}
    </div>
  );
}

/* ── NAV ── */
function Nav({page,go,buyer,cnt}){
  const[sc,setSc]=useState(false);
  useEffect(()=>{const h=()=>setSc(window.scrollY>40);window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h);},[]);
  const onHome=page==='home';
  return(
    <header style={{position:'fixed',top:0,left:0,right:0,zIndex:100,background:sc||!onHome?'rgba(12,11,9,.97)':'transparent',backdropFilter:'blur(24px)',borderBottom:sc||!onHome?'1px solid rgba(201,169,110,.1)':'1px solid transparent',transition:'all .4s'}}>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'0 32px',height:66,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div onClick={()=>go('home')} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:13}}>
          <div style={{width:36,height:36,borderRadius:3,background:'linear-gradient(135deg,#C9A96E,#E8C98A)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'JetBrains Mono'",fontWeight:700,fontSize:10,color:INK,letterSpacing:'-.01em'}}>MAQ</div>
          <div>
            <div style={{fontFamily:"'Libre Baskerville'",fontSize:15,color:'var(--cream)',letterSpacing:'-.01em',lineHeight:1.1}}>MAQ Group</div>
            <div style={{fontSize:9,color:'var(--gold)',textTransform:'uppercase',letterSpacing:'.18em',fontWeight:500}}>Premier Real Estate</div>
          </div>
        </div>
        <nav style={{display:'flex',alignItems:'center',gap:2}}>
          {[{k:'home',l:'Home'},{k:'buy',l:'Buy / Invest'},{k:'stays',l:'MAQ Stays'},{k:'dashboard',l:'My Account'}].map(n=>(
            <button key={n.k} onClick={()=>go(n.k)} style={{padding:'9px 18px',border:'none',borderRadius:2,cursor:'pointer',background:page===n.k?'rgba(201,169,110,.1)':'transparent',color:page===n.k?'var(--gold2)':'var(--warm)',fontSize:13,fontWeight:page===n.k?500:300,borderBottom:page===n.k?'1px solid var(--gold)':'1px solid transparent',transition:'all .2s',letterSpacing:'.01em'}}>
              {n.l}{n.k==='dashboard'&&cnt>0&&<span style={{marginLeft:6,background:'var(--gold)',color:INK,fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:10}}>{cnt}</span>}
            </button>
          ))}
          <div style={{width:1,height:18,background:'rgba(201,169,110,.15)',margin:'0 6px'}}/>
          <button onClick={()=>go('stays')} className="btn-gold" style={{padding:'9px 20px',fontSize:12}}>Book a Stay →</button>
        </nav>
      </div>
    </header>
  );
}

/* ── BROWSE ── */
function Browse({onSel}){
  const[filter,setFilter]=useState("all");
  const[sort,setSort]=useState("price_asc");
  const[search,setSearch]=useState("");
  const TYPES=[{k:"all",l:"All Properties"},{k:"land",l:"Vacant Land"},{k:"residential",l:"Residential"},{k:"rental",l:"For Lease"},{k:"commercial",l:"Commercial"}];
  const list=useMemo(()=>{
    let r=PROPS.filter(p=>(filter==="all"||p.type===filter)&&(!search||[p.name,p.address,p.county].some(x=>x.toLowerCase().includes(search.toLowerCase()))));
    return sort==="price_asc"?r.sort((a,b)=>a.price-b.price):r.sort((a,b)=>b.price-a.price);
  },[filter,sort,search]);

  return(
    <div style={{minHeight:'100vh',paddingTop:66}}>
      <div style={{background:'var(--ink2)',borderBottom:'1px solid rgba(201,169,110,.07)',padding:'52px 32px 36px'}}>
        <div style={{maxWidth:1280,margin:'0 auto'}}>
          <div className="fa" style={{fontSize:10,color:'var(--gold)',textTransform:'uppercase',letterSpacing:'.15em',marginBottom:12,fontWeight:500}}>MAQ Group Portfolio</div>
          <h1 className="fa fa1" style={{fontFamily:"'Libre Baskerville'",fontSize:'clamp(30px,4vw,50px)',fontWeight:400,color:'var(--cream)',letterSpacing:'-.02em',marginBottom:10}}>Properties <em style={{fontStyle:'italic',color:'var(--gold2)'}}>For Sale</em></h1>
          <p className="fa fa2" style={{fontSize:15,color:'var(--warm)',maxWidth:500,marginBottom:28,lineHeight:1.65}}>Owner-financed properties across Florida and California. Start with as little as $500 down — no bank needed.</p>
          <div className="fa fa3" style={{position:'relative',maxWidth:420,marginBottom:24}}>
            <span style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'var(--warm2)'}}>🔍</span>
            <input className="inp" style={{paddingLeft:42}} placeholder="Search by name, city, or county…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div className="fa fa4" style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {TYPES.map(t=>(
                <button key={t.k} onClick={()=>setFilter(t.k)} style={{padding:'8px 16px',borderRadius:2,border:'1px solid',cursor:'pointer',borderColor:filter===t.k?'var(--gold)':'rgba(201,169,110,.15)',background:filter===t.k?'rgba(201,169,110,.1)':'transparent',color:filter===t.k?'var(--gold2)':'var(--warm)',fontSize:12,fontWeight:filter===t.k?500:300,transition:'all .2s'}}>
                  {t.l}
                </button>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:12,color:'var(--warm2)'}}>{list.length} results</span>
              <select value={sort} onChange={e=>setSort(e.target.value)} style={{padding:'9px 14px',borderRadius:2,border:'1px solid rgba(201,169,110,.15)',background:'var(--ink3)',color:'var(--warm)',fontSize:12,cursor:'pointer',outline:'none'}}>
                <option value="price_asc">Price: Low → High</option>
                <option value="price_desc">Price: High → Low</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'32px 32px 80px'}}>
        {list.length===0?(
          <div style={{textAlign:'center',padding:'80px 0',color:'var(--warm2)'}}>
            <div style={{fontSize:48,marginBottom:16}}>🔍</div>
            <div style={{fontFamily:"'Libre Baskerville'",fontSize:22,color:'var(--warm)'}}>No properties found</div>
            <div style={{fontSize:13,marginTop:8}}>Try adjusting your search or filter</div>
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:20}}>
            {list.map((p,i)=><PropCard key={p.id} p={p} onClick={()=>onSel(p)} delay={Math.min(i,5)}/>)}

}

    <div className={`fa fa${delay}`} onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}

      <div style={{height:155,background:'linear-gradient(135deg,#141310,#1E1C18)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:50,position:'relative'}}>

        {!p.isRental&&p.avail===1&&p.type==='land'&&<div style={{position:'absolute',top:12,left:12}}><span className="tag tg">Last Parcel</span></div>}
        <div style={{position:'absolute',bottom:0,left:0,right:0,height:48,background:`linear-gradient(transparent,${hov?'#1E1C18':'#141310'})`}}/>
      </div>
      <div style={{padding:'20px 22px 24px'}}>
        <div style={{display:'flex',justifyContent:'space-between',gap:8,marginBottom:4,alignItems:'flex-start'}}>
          <div style={{fontFamily:"'Libre Baskerville'",fontSize:17,color:'var(--cream)',lineHeight:1.3}}>{p.name}</div>
          <span className={`tag ${p.type==='land'?'tgw':p.type==='rental'?'tgb':'tg'}`} style={{flexShrink:0,marginTop:2}}>{p.sub}</span>
        </div>
        <div style={{fontSize:12,color:'var(--warm2)',marginBottom:14,display:'flex',alignItems:'center',gap:4}}>📍 {p.address}</div>
        <div className="divr" style={{marginBottom:14}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
          <div>
            <div style={{fontSize:9,color:'var(--warm2)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:3}}>{p.isRental?'Monthly Rent':'List Price'}</div>
            <div style={{fontFamily:"'Libre Baskerville'",fontSize:24,color:'var(--gold2)'}}>{p.isRental?`${fmt(p.price)}/mo`:fmt(p.price)}</div>
          </div>
          {!p.isRental&&(
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:9,color:'#7DC89A',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2}}>As low as</div>
              <div style={{fontFamily:"'JetBrains Mono'",fontSize:14,color:'#7DC89A',fontWeight:500}}>{fmtM(mo)}</div>
              <div style={{fontSize:10,color:'var(--warm2)',marginTop:2}}>{p.lot}</div>
            </div>
          )}
        </div>
        {!p.isRental&&(
          <div style={{marginTop:12,padding:'9px 13px',background:'rgba(201,169,110,.05)',border:'1px solid rgba(201,169,110,.1)',borderRadius:2,fontSize:11,color:'var(--gold)',display:'flex',alignItems:'center',gap:5}}>
            ↓ {p.minDown}% down · {fmtF(p.price*p.minDown/100)} to start
          </div>
        )}
      </div>
    </div>
  );
}

/* ── PROPERTY DETAIL (Zillow-quality) ── */
function PropDetail({p,onBack,onCheckout}){
  const[dp,setDp]=useState(p.minDown);
  const[term,setTerm]=useState(p.isRental?12:Math.min(p.maxTerm,p.price<50000?48:120));
  const[saved,setSaved]=useState(false);
  const[showPhotoModal,setShowPhotoModal]=useState(false);
  const da=p.price*dp/100;
  const fi=p.price-da;
  const mo=p.isRental?p.price:calcPmt(fi,p.rate,term);
  const tot=p.isRental?p.price*term:da+mo*term;
  const int=p.isRental?0:tot-p.price;
  const terms=[];
  if(!p.isRental){for(let t=12;t<=p.maxTerm;t+=(t<60?12:60))terms.push(t);if(!terms.includes(p.maxTerm))terms.push(p.maxTerm);}
  else[6,12,24].forEach(t=>terms.push(t));

  // Property type-specific gradients
  const bgMap={land:'linear-gradient(155deg,#0A1A0A,#142814,#0A1208)',residential:'linear-gradient(155deg,#14100A,#241C10,#181410)',commercial:'linear-gradient(155deg,#0A0E1A,#101828,#0E141A)',rental:'linear-gradient(155deg,#0A0E1A,#101428,#060A14)'};
  const bg=bgMap[p.type]||bgMap.land;

  // Neighborhood data
  const neighborhood={
    walkScore:p.county==='Broward'||p.county==='Palm Beach'?82:54,

    schools:p.state==='FL'?'A-rated district':'Highly rated',
    appreciation:p.type==='land'?'+12.4%':p.county==='Broward'?'+8.1%':'+6.3%',
    medianPrice:p.type==='land'?'$4,800/lot':p.county==='Broward'?'$320K':'$180K',

  const details=p.type==='land'
    ?[{l:'Lot Size',v:p.lot},{l:'County',v:`${p.county}, ${p.state}`},{l:'Available',v:p.avail.toLocaleString()+' lots'},{l:'Zoning',v:'Residential'},{l:'Financing',v:'Owner Financed'},{l:'Rate',v:p.rate+'% APR'},{l:'HOA',v:'$0 / None'},{l:'Access',v:'Paved Road'}]

    ?[{l:'Size',v:p.lot},{l:'Beds',v:p.beds||'—'},{l:'Baths',v:p.baths||'—'},{l:'County',v:p.county},{l:'Lease Type',v:'Annual'},{l:'Available',v:'Now'},{l:'Pets',v:'Inquire'},{l:'Parking',v:'Included'}]

  return(
    <div style={{minHeight:'100vh',paddingTop:66}}>
      {/* Photo Modal */}

        <div className="modal-overlay" onClick={()=>setShowPhotoModal(false)}>

            <div style={{fontSize:80,marginBottom:16}}>{p.emoji}</div>

/* ── CHECKOUT ── */
function Checkout({p,onComplete,onBack}){
  const[step,setStep]=useState(1);
  const[form,setForm]=useState({name:'',email:'',phone:'',address:''});
  const[card,setCard]=useState({number:'',exp:'',cvc:''});
  const[proc,setProc]=useState(false);
  const u=(k,v)=>setForm(x=>({...x,[k]:v}));
  const uc=(k,v)=>setCard(x=>({...x,[k]:v}));
  const da=p.isRental?p.price*2:p.price*p.minDown/100;
  const mo=p.isRental?p.price:calcPmt(p.price-da,p.rate,p.maxTerm);
  const step1Valid=form.name.trim().length>1&&form.email.includes('@')&&form.phone.length>8&&form.address.trim().length>5;
  const step2Valid=card.number.replace(/\s/g,'').length>=15&&card.exp.length>=4&&card.cvc.length>=3;
  const STEPS=['Your Info','Payment','Review'];
  return(
    <div style={{minHeight:'100vh',paddingTop:66}}>
      <div style={{maxWidth:680,margin:'0 auto',padding:'28px 24px 80px'}}>
        <button onClick={step>1?()=>setStep(s=>s-1):onBack} style={{background:'none',border:'none',color:'var(--warm)',fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6,marginBottom:28,padding:0}}>← {step>1?'Back':'Return to property'}</button>

        {/* Step indicator */}
        <div style={{display:'flex',marginBottom:32,gap:0}}>
          {STEPS.map((s,i)=>(
            <div key={i} style={{flex:1,textAlign:'center',cursor:i+1<step?'pointer':'default'}} onClick={()=>{if(i+1<step)setStep(i+1);}}>
              <div style={{display:'flex',alignItems:'center'}}>
                <div style={{height:2,flex:1,background:i===0?'transparent':i+1<=step?'var(--gold)':'rgba(201,169,110,.15)',transition:'background .4s'}}/>
                <div style={{width:28,height:28,borderRadius:'50%',background:i+1===step?'var(--gold)':i+1<step?'rgba(201,169,110,.3)':'rgba(255,255,255,.06)',border:i+1===step?'none':'1px solid rgba(201,169,110,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:i+1===step?'var(--ink)':i+1<step?'var(--gold2)':'var(--warm2)',flexShrink:0,transition:'all .3s'}}>
                  {i+1<step?'✓':i+1}
                </div>
                <div style={{height:2,flex:1,background:i===STEPS.length-1?'transparent':i+2<=step?'var(--gold)':'rgba(201,169,110,.15)',transition:'background .4s'}}/>
              </div>
              <div style={{fontSize:11,color:i+1===step?'var(--gold2)':i+1<step?'var(--warm)':'var(--warm2)',marginTop:6,fontWeight:i+1===step?500:300}}>{s}</div>
            </div>
          ))}
        </div>

        {/* Property summary strip */}
        <div style={{background:'var(--ink2)',border:'1px solid rgba(201,169,110,.12)',borderRadius:10,padding:'14px 18px',marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            <div style={{fontSize:28}}>{p.emoji}</div>
            <div>
              <div style={{fontFamily:"'DM Serif Display'",fontSize:15,color:'var(--cream)'}}>{p.name}</div>
              <div style={{fontSize:11,color:'var(--warm2)',marginTop:1}}>{p.address}</div>
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:9,color:'var(--warm2)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:2}}>Due Today</div>
            <div style={{fontFamily:"'JetBrains Mono'",fontSize:18,color:'var(--gold2)',fontWeight:600}}>{fmtF(da)}</div>
          </div>
        </div>

        <div style={{background:'var(--ink2)',border:'1px solid rgba(201,169,110,.12)',borderRadius:10,padding:28}}>

          {/* STEP 1: Personal Info */}
          {step===1&&(
            <div className="fa">
              <h3 style={{fontFamily:"'DM Serif Display'",fontSize:22,color:'var(--cream)',marginBottom:6}}>Your information</h3>
              <div style={{fontSize:12,color:'var(--warm2)',marginBottom:22}}>Used for your purchase agreement and communications.</div>
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                <div><label className="lbl">Full Legal Name</label><input className="inp" value={form.name} onChange={e=>u('name',e.target.value)} placeholder="John Smith"/></div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <div><label className="lbl">Email Address</label><input className="inp" type="email" value={form.email} onChange={e=>u('email',e.target.value)} placeholder="john@example.com"/></div>
                  <div><label className="lbl">Phone Number</label><input className="inp" value={form.phone} onChange={e=>u('phone',e.target.value)} placeholder="(561) 123-4567"/></div>
                </div>
                <div><label className="lbl">Mailing Address</label><input className="inp" value={form.address} onChange={e=>u('address',e.target.value)} placeholder="123 Main St, Boca Raton, FL 33432"/></div>
              </div>
              <button onClick={()=>{if(step1Valid)setStep(2);}} disabled={!step1Valid}
                className={step1Valid?'btn-gold':''}
                style={{width:'100%',justifyContent:'center',padding:'14px',fontSize:14,marginTop:22,borderRadius:8,opacity:step1Valid?1:.5,cursor:step1Valid?'pointer':'not-allowed',...(!step1Valid?{background:'rgba(255,255,255,.06)',color:'var(--warm2)',border:'none',fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center'}:{})}}>
                Continue to Payment →
              </button>
            </div>
          )}

          {/* STEP 2: Payment */}
          {step===2&&(
            <div className="fa">
              <h3 style={{fontFamily:"'DM Serif Display'",fontSize:22,color:'var(--cream)',marginBottom:6}}>Payment details</h3>
              <div style={{fontSize:12,color:'var(--warm2)',marginBottom:22}}>🔒 256-bit SSL · Your card is charged {fmtF(da)} today to secure your property.</div>
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                <div>
                  <label className="lbl">Card Number</label>
                  <div style={{position:'relative'}}>
                    <input className="inp" value={card.number} onChange={e=>uc('number',e.target.value.replace(/[^\d\s]/g,'').slice(0,19))} placeholder="1234 5678 9012 3456"/>
                    <span style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',fontSize:18}}>
                      {card.number.startsWith('4')?'💳':card.number.startsWith('5')?'💳':'💳'}
                    </span>
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <div><label className="lbl">Expiry Date</label><input className="inp" value={card.exp} onChange={e=>uc('exp',e.target.value)} placeholder="MM / YY"/></div>
                  <div><label className="lbl">Security Code</label><input className="inp" value={card.cvc} onChange={e=>uc('cvc',e.target.value.slice(0,4))} placeholder="CVC"/></div>
                </div>
              </div>
              <div style={{margin:'16px 0',padding:'11px 14px',background:'rgba(90,158,111,.06)',border:'1px solid rgba(90,158,111,.2)',borderRadius:6,fontSize:12,color:'#7DC89A'}}>
                ✓ 5-day cancellation window · No bank required · Owner financed
              </div>
              <button onClick={()=>{if(step2Valid)setStep(3);}} disabled={!step2Valid}
                className={step2Valid?'btn-gold':''}
                style={{width:'100%',justifyContent:'center',padding:'14px',fontSize:14,borderRadius:8,opacity:step2Valid?1:.5,cursor:step2Valid?'pointer':'not-allowed',...(!step2Valid?{background:'rgba(255,255,255,.06)',color:'var(--warm2)',border:'none',fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center'}:{})}}>
                Review Order →
              </button>
            </div>
          )}

          {/* STEP 3: Review + Confirm */}
          {step===3&&(
            <div className="fa">
              <h3 style={{fontFamily:"'DM Serif Display'",fontSize:22,color:'var(--cream)',marginBottom:20}}>Review your order</h3>
              {/* Summary */}
              <div style={{background:'rgba(201,169,110,.04)',border:'1px solid rgba(201,169,110,.1)',borderRadius:8,padding:'16px 18px',marginBottom:18}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px 20px'}}>
                  {[{l:'Buyer',v:form.name},{l:'Email',v:form.email},{l:'Phone',v:form.phone},{l:'Mailing Address',v:form.address},{l:'Down Payment',v:fmtF(da)},{l:'Monthly Payment',v:fmtM(mo)},{l:'Rate',v:p.rate+'% APR'},{l:'Term',v:p.maxTerm>=12?`${p.maxTerm/12}yr`:`${p.maxTerm}mo`}].map(r=>(
                    <div key={r.l}>
                      <div style={{fontSize:9,color:'var(--warm2)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:2}}>{r.l}</div>
                      <div style={{fontSize:13,color:'var(--cream)',fontWeight:500,wordBreak:'break-all'}}>{r.v}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{padding:'12px 14px',background:'rgba(201,169,110,.05)',border:'1px solid rgba(201,169,110,.12)',borderRadius:6,fontSize:12,color:'var(--warm)',marginBottom:18}}>
                Card ending in <strong style={{color:'var(--cream)'}}>{card.number.slice(-4)||'****'}</strong> · Charged {fmtF(da)} today
              </div>
              <button onClick={()=>{if(!proc){setProc(true);setTimeout(()=>onComplete({...form,downPayment:da,monthly:mo,property:p}),2400);}}}
                disabled={proc} className={proc?'':'btn-gold'}
                style={{width:'100%',justifyContent:'center',padding:'15px',fontSize:14,borderRadius:8,
                  ...(proc?{background:'rgba(255,255,255,.08)',color:'var(--warm)',border:'none',fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:10}:{})}}>
                {proc?<><span className="spinner"/><span>Processing reservation…</span></>:`Confirm & Pay ${fmtF(da)}`}
              </button>
              <div style={{textAlign:'center',marginTop:8,fontSize:11,color:'var(--warm2)'}}>🔒 Secured by Stripe · Owner financed by MAQ Group</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

      <div style={{maxWidth:1280,margin:'0 auto',padding:'32px 32px 80px'}}>
        {list.length===0?(
          <div style={{textAlign:'center',padding:'80px 0'}}>
            <div style={{fontSize:52,marginBottom:16}}>🔍</div>
            <div style={{fontFamily:"'DM Serif Display'",fontSize:24,color:'var(--warm)',marginBottom:8}}>No stays found</div>
            <div style={{fontSize:13,color:'var(--warm2)',marginBottom:20}}>Try adjusting your filters</div>
            <button className="btn-ghost" onClick={()=>{setFilter('all');setGuests(1);setMaxP(999);}}>Clear filters</button>
          </div>
        ):(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:28}}>
            {list.map((s,i)=><StayCard key={s.id} s={s} onClick={()=>onSel(s)} delay={Math.min(i,5)}/>)}
          </div>
        )}
      </div>
    </div>
  );
}

function StayCard({s,onClick,delay}){
  const[hov,setHov]=useState(false);
  const[saved,setSaved]=useState(false);
  // Distinct gradient per stay type
  const gradients={
    condo:'linear-gradient(155deg,#0D1E2E 0%,#1A3A4A 50%,#0E2218 100%)',
    house:'linear-gradient(155deg,#1A1408 0%,#2E2010 50%,#181818 100%)',
    villa:'linear-gradient(155deg,#1A0E1A 0%,#2E1B3A 50%,#0E1A10 100%)',
    estate:'linear-gradient(155deg,#0E0E0E 0%,#1A1200 50%,#200E00 100%)',
  };
  const bg=gradients[s.type]||gradients.condo;
  return(
    <div className={`fa fa${delay}`} onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{cursor:'pointer',borderRadius:12,overflow:'hidden',transition:'all .3s',transform:hov?'translateY(-4px)':'none',boxShadow:hov?'0 20px 50px rgba(0,0,0,.5)':'none'}}>

      <div style={{height:240,background:bg,position:'relative',overflow:'hidden',borderRadius:12,marginBottom:12}}>
        {/* Main emoji display */}
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontSize:80,filter:'drop-shadow(0 8px 32px rgba(0,0,0,.6))',transition:'transform .3s',transform:hov?'scale(1.08)':'scale(1)'}}>{s.emoji}</div>
        </div>
        {/* Subtle ambient glow */}
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at center,rgba(201,169,110,.06) 0%,transparent 70%)'}}/>
        {/* Top row badges */}
        <div style={{position:'absolute',top:12,left:12,right:12,display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <span className="tag tg" style={{backdropFilter:'blur(8px)',background:'rgba(12,11,9,.75)',border:'1px solid rgba(201,169,110,.3)'}}>{s.hi}</span>
          <button onClick={e=>{e.stopPropagation();setSaved(v=>!v);}}
            style={{width:32,height:32,borderRadius:'50%',background:'rgba(12,11,9,.6)',border:'none',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(8px)',transition:'transform .2s',transform:saved?'scale(1.2)':'scale(1)'}}>
            {saved?'❤️':'🤍'}
          </button>
        </div>
        {/* Rating badge bottom */}
        <div style={{position:'absolute',bottom:12,left:12,background:'rgba(12,11,9,.8)',backdropFilter:'blur(8px)',borderRadius:6,padding:'4px 10px',display:'flex',alignItems:'center',gap:5}}>
          <span style={{color:'#FFD700',fontSize:12}}>★</span>
          <span style={{fontSize:12,color:'var(--cream)',fontWeight:600}}>{s.rating}</span>
          <span style={{fontSize:11,color:'var(--warm2)'}}>({s.reviews})</span>
        </div>
        {/* Photo count indicator */}
        <div style={{position:'absolute',bottom:12,right:12,background:'rgba(12,11,9,.8)',backdropFilter:'blur(8px)',borderRadius:6,padding:'4px 10px',fontSize:10,color:'var(--warm2)',display:'flex',alignItems:'center',gap:4}}>
          📷 6 photos
        </div>
        {/* Bottom gradient */}
        <div style={{position:'absolute',bottom:0,left:0,right:0,height:80,background:'linear-gradient(transparent,rgba(12,11,9,.7))'}}/>
      </div>
      {/* Info */}
      <div style={{padding:'0 4px 8px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
          <div style={{fontFamily:"'Outfit'",fontSize:15,fontWeight:500,color:'var(--cream)',lineHeight:1.3,flex:1,paddingRight:8}}>{s.name}</div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <span style={{fontFamily:"'DM Serif Display'",fontSize:18,color:'var(--gold2)'}}>${s.night}</span>
            <span style={{fontSize:11,color:'var(--warm2)'}}> /night</span>
          </div>
        </div>
        <div style={{fontSize:12,color:'var(--warm2)',marginBottom:6,fontStyle:'italic'}}>{s.tagline}</div>
        <div style={{fontSize:12,color:'var(--warm2)',marginBottom:8}}>📍 {s.addr}</div>
        <div style={{display:'flex',gap:10,fontSize:11,color:'var(--warm2)'}}>
          <span>🛏 {s.beds} bd</span>
          <span>🚿 {s.baths} ba</span>
          <span>👥 {s.guests} guests</span>
          {s.amen.includes('Private Beach')||s.amen.includes('Oceanfront')?<span style={{color:'var(--blue)'}}>🌊 Oceanfront</span>:null}
          {s.amen.includes('Private Pool')||s.amen.includes('Heated Pool')?<span style={{color:'#7DC89A'}}>🏊 Pool</span>:null}
        </div>
      </div>
    </div>
  );
}

              {/* Price breakdown */}
              {nights>0&&(
                <div style={{borderTop:'1px solid rgba(201,169,110,.1)',paddingTop:16}}>
                  {[
                    {l:`$${s.night} × ${nights} night${nights!==1?'s':''}`,v:sub},
                    {l:'Cleaning fee',v:s.clean},
                    {l:'MAQ service fee (12%)',v:svcFee},
                  ].map((li,i)=>(
                    <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',fontSize:13,color:'var(--warm)',borderBottom:'1px solid rgba(201,169,110,.05)'}}>
                      <span style={{textDecoration:'underline',cursor:'help'}}>{li.l}</span>
                      <span style={{fontFamily:"'JetBrains Mono'",color:'var(--cream)'}}>{fmtF(li.v)}</span>
                    </div>
                  ))}
                  <div style={{display:'flex',justifyContent:'space-between',padding:'12px 0 0',fontSize:15,fontWeight:600}}>
                    <span style={{color:'var(--cream)'}}>Total before taxes</span>
                    <span style={{fontFamily:"'JetBrains Mono'",color:'var(--gold2)'}}>{fmtF(tot)}</span>
                  </div>
                </div>
              )}

              {/* Host info */}
              <div style={{marginTop:18,paddingTop:16,borderTop:'1px solid rgba(201,169,110,.08)',display:'flex',gap:12,alignItems:'center'}}>
                <div style={{width:42,height:42,borderRadius:'50%',background:'linear-gradient(135deg,var(--gold),var(--gold2))',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'JetBrains Mono'",fontWeight:700,fontSize:10,color:'var(--ink)',flexShrink:0}}>MAQ</div>
                <div>
                  <div style={{fontSize:12,fontWeight:500,color:'var(--cream)'}}>Hosted by MAQ Group</div>
                  <div style={{fontSize:11,color:'#7DC89A'}}>✓ Verified host · Superhost · Quick response</div>
                </div>
              </div>

              {/* Safety */}
              <div style={{marginTop:14,padding:'10px 12px',background:'rgba(90,158,111,.05)',border:'1px solid rgba(90,158,111,.15)',borderRadius:6,fontSize:11,color:'#7DC89A',textAlign:'center'}}>
                ✓ Free cancellation up to 48 hours before check-in
              </div>
            </div>

            {/* Report */}
            <div style={{textAlign:'center',marginTop:14}}>
              <button style={{background:'none',border:'none',color:'var(--warm2)',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Report this listing</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── STAY BOOKING ── */
function StayBook({s,bp,onComplete,onBack}){
  const[form,setForm]=useState({name:'',email:'',phone:''});
  const[card,setCard]=useState({number:'',exp:'',cvc:''});
  const[proc,setProc]=useState(false);
  const u=(k,v)=>setForm(x=>({...x,[k]:v}));
  const uc=(k,v)=>setCard(x=>({...x,[k]:v}));
  // Use booking params from detail page, or fallback defaults
  const nights=bp?.nights||3;
  const tot=bp?.tot||(s.night*3+s.clean);
  const ci=bp?.ci||'';
  const co=bp?.co||'';
  const gc=bp?.gc||2;
  const svcFee=Math.round(s.night*nights*0.12);

  const valid=form.name.trim().length>1&&form.email.includes('@')&&form.phone.length>8&&card.number.replace(/\s/g,'').length>=15&&card.exp.length>=4&&card.cvc.length>=3;

  return(
    <div style={{minHeight:'100vh',paddingTop:66}}>
      <div style={{maxWidth:720,margin:'0 auto',padding:'28px 24px 80px',display:'grid',gridTemplateColumns:'1fr 380px',gap:36,alignItems:'start'}}>
        <div>
          <button onClick={onBack} style={{background:'none',border:'none',color:'var(--warm)',fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6,marginBottom:28,padding:0}}>← Edit reservation</button>
          <h2 style={{fontFamily:"'DM Serif Display'",fontSize:28,color:'var(--cream)',marginBottom:6}}>Confirm & pay</h2>
          <div style={{fontSize:13,color:'var(--warm)',marginBottom:28}}>You won't be charged until after your host confirms your reservation.</div>

          {/* Trip details summary */}
          <div style={{background:'rgba(201,169,110,.04)',border:'1px solid rgba(201,169,110,.1)',borderRadius:10,padding:'18px 20px',marginBottom:24}}>
            <div style={{fontFamily:"'DM Serif Display'",fontSize:17,color:'var(--cream)',marginBottom:12}}>Your trip</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div>
                <div style={{fontSize:10,color:'var(--warm)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>Dates</div>
                <div style={{fontSize:13,color:'var(--cream)',fontWeight:500}}>{ci&&co?`${new Date(ci+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${new Date(co+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`:`${nights} nights`}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'var(--warm)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>Guests</div>
                <div style={{fontSize:13,color:'var(--cream)',fontWeight:500}}>{gc} guest{gc>1?'s':''}</div>
              </div>
            </div>
          </div>

          {/* Personal info */}
          <div style={{marginBottom:24,paddingBottom:24,borderBottom:'1px solid rgba(201,169,110,.08)'}}>
            <div style={{fontFamily:"'DM Serif Display'",fontSize:20,color:'var(--cream)',marginBottom:16}}>Personal info</div>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div><label className="lbl">Full Name</label><input className="inp" value={form.name} onChange={e=>u('name',e.target.value)} placeholder="John Smith"/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div><label className="lbl">Email</label><input className="inp" type="email" value={form.email} onChange={e=>u('email',e.target.value)} placeholder="john@example.com"/></div>
                <div><label className="lbl">Phone</label><input className="inp" value={form.phone} onChange={e=>u('phone',e.target.value)} placeholder="(555) 123-4567"/></div>
              </div>
            </div>
          </div>

          {/* Payment */}
          <div style={{marginBottom:24}}>
            <div style={{fontFamily:"'DM Serif Display'",fontSize:20,color:'var(--cream)',marginBottom:4}}>Pay with</div>
            <div style={{fontSize:12,color:'var(--warm2)',marginBottom:16}}>🔒 Your payment info is encrypted and secure</div>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div><label className="lbl">Card Number</label>
                <input className="inp" value={card.number} onChange={e=>uc('number',e.target.value.replace(/[^\d\s]/g,'').slice(0,19))} placeholder="1234 5678 9012 3456"/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div><label className="lbl">Expiry</label><input className="inp" value={card.exp} onChange={e=>uc('exp',e.target.value)} placeholder="MM / YY"/></div>
                <div><label className="lbl">Security Code</label><input className="inp" value={card.cvc} onChange={e=>uc('cvc',e.target.value.slice(0,4))} placeholder="CVC"/></div>
              </div>
            </div>
          </div>

          {/* Cancellation */}
          <div style={{padding:'14px 16px',background:'rgba(90,158,111,.05)',border:'1px solid rgba(90,158,111,.2)',borderRadius:8,fontSize:13,color:'#7DC89A',marginBottom:20}}>
            ✓ Free cancellation up to 48 hours before check-in · No hidden fees
          </div>

          <button onClick={()=>{if(valid&&!proc){setProc(true);setTimeout(()=>onComplete({...form,total:tot,nights,checkIn:ci,checkOut:co,guests:gc}),2400);}}}
            disabled={!valid||proc}
            className={valid&&!proc?'btn-gold':''}
            style={{width:'100%',justifyContent:'center',padding:'16px',fontSize:15,borderRadius:10,opacity:(!valid||proc)?.6:1,cursor:(!valid||proc)?'not-allowed':'pointer',
              ...(!valid||proc?{background:'rgba(255,255,255,.06)',color:'var(--warm2)',border:'none',fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:10}:{})}}>
            {proc?<><span className="spinner"/><span>Confirming reservation…</span></>:`Confirm Reservation · ${fmtF(tot)}`}
          </button>
          <div style={{textAlign:'center',marginTop:8,fontSize:11,color:'var(--warm2)'}}>By confirming you agree to MAQ Group's guest policy</div>
        </div>

        {/* Sticky property summary */}
        <div style={{position:'sticky',top:86}}>
          <div style={{background:'var(--ink2)',border:'1px solid rgba(201,169,110,.15)',borderRadius:12,overflow:'hidden'}}>
            <div style={{height:160,background:'linear-gradient(135deg,var(--ink3),var(--ink4))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:60,position:'relative'}}>
              {s.emoji}
              <div style={{position:'absolute',bottom:0,left:0,right:0,height:40,background:'linear-gradient(transparent,var(--ink2))'}}/>
            </div>
            <div style={{padding:'16px 20px'}}>
              <div style={{fontFamily:"'DM Serif Display'",fontSize:17,color:'var(--cream)',marginBottom:4}}>{s.name}</div>
              <div style={{fontSize:11,color:'var(--warm2)',marginBottom:2}}>{s.type.charAt(0).toUpperCase()+s.type.slice(1)} · {s.addr}</div>
              <div style={{display:'flex',gap:6,alignItems:'center',fontSize:12,marginBottom:14,marginTop:6}}>
                <span style={{color:'#FFD700'}}>★</span>
                <span style={{color:'var(--cream)',fontWeight:500}}>{s.rating}</span>
                <span style={{color:'var(--warm2)'}}>({s.reviews})</span>
              </div>
              <div className="divr" style={{marginBottom:14}}/>
              <div style={{fontFamily:"'DM Serif Display'",fontSize:16,color:'var(--cream)',marginBottom:12}}>Price details</div>
              {[
                {l:`$${s.night} × ${nights} night${nights>1?'s':''}`,v:s.night*nights},
                {l:'Cleaning fee',v:s.clean},
                {l:'Service fee',v:svcFee},
              ].map((li,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,color:'var(--warm)',padding:'6px 0',borderBottom:'1px solid rgba(201,169,110,.06)'}}>
                  <span>{li.l}</span><span style={{fontFamily:"'JetBrains Mono'",color:'var(--cream)'}}>{fmtF(li.v)}</span>
                </div>
              ))}
              <div style={{display:'flex',justifyContent:'space-between',fontSize:14,fontWeight:600,padding:'12px 0 0'}}>
                <span style={{color:'var(--cream)'}}>Total</span>
                <span style={{fontFamily:"'JetBrains Mono'",color:'var(--gold2)'}}>{fmtF(tot)}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── DASHBOARD ── */
function Dashboard({purchases,bookings,buyer,go}){
  const[tab,setTab]=useState('overview');
  const ti=purchases.reduce((s,p)=>s+p.downPayment,0);
  const tb=bookings.reduce((s,b)=>s+b.total,0);
  if(!buyer&&!purchases.length&&!bookings.length){
    return(
      <div style={{minHeight:'100vh',paddingTop:66,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{textAlign:'center',maxWidth:380,padding:40}}>
          <div style={{fontSize:52,marginBottom:16}}>🏠</div>
          <h2 style={{fontFamily:"'Libre Baskerville'",fontSize:26,color:'var(--cream)',marginBottom:10}}>No Activity Yet</h2>
          <p style={{color:'var(--warm)',fontSize:14,lineHeight:1.7,marginBottom:24}}>Complete a purchase or booking to see your account here.</p>
          <div style={{display:'flex',gap:10,justifyContent:'center'}}>
            <button className="btn-gold" onClick={()=>go('buy')}>Browse Properties</button>
            <button className="btn-ghost" onClick={()=>go('stays')}>Book a Stay</button>
          </div>
        </div>
      </div>
    );
  }
  return(
    <div style={{minHeight:'100vh',paddingTop:66}}>
      <div style={{background:'var(--ink2)',borderBottom:'1px solid rgba(201,169,110,.07)',padding:'40px 32px 0'}}>
        <div style={{maxWidth:1280,margin:'0 auto'}}>
          <div style={{fontSize:10,color:'var(--gold)',textTransform:'uppercase',letterSpacing:'.15em',marginBottom:8,fontWeight:500}}>My Account</div>
          <h1 style={{fontFamily:"'Libre Baskerville'",fontSize:'clamp(24px,3.5vw,38px)',fontWeight:400,color:'var(--cream)',marginBottom:4,letterSpacing:'-.02em'}}>Welcome back{buyer?.name?`, ${buyer.name.split(' ')[0]}`:''}.</h1>
          <p style={{fontSize:13,color:'var(--warm)',marginBottom:22}}>Your MAQ Group portfolio at a glance.</p>
          <div style={{display:'flex',gap:0,borderBottom:'1px solid rgba(201,169,110,.1)'}}>
            {[{k:'overview',l:'Overview'},{k:'properties',l:`Properties (${purchases.length})`},{k:'bookings',l:`Stays (${bookings.length})`}].map(t=>(
              <button key={t.k} onClick={()=>setTab(t.k)} style={{padding:'11px 20px',border:'none',background:'none',cursor:'pointer',fontSize:13,color:tab===t.k?'var(--gold2)':'var(--warm)',fontWeight:tab===t.k?500:300,borderBottom:tab===t.k?'2px solid var(--gold)':'2px solid transparent',transition:'all .2s',marginBottom:-1}}>
                {t.l}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{maxWidth:1280,margin:'0 auto',padding:'32px 32px 80px'}}>
        {tab==='overview'&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:36}}>
              {[{n:purchases.length,l:'Properties',ic:'🏠'},{n:bookings.length,l:'Stays Booked',ic:'🌊'},{n:fmtF(ti),l:'Invested',ic:'💰'},{n:fmtF(tb),l:'Bookings',ic:'📋'}].map((s,i)=>(
                <div key={i} style={{background:'var(--ink2)',border:'1px solid rgba(201,169,110,.1)',borderRadius:4,padding:'22px 20px'}}>
                  <div style={{fontSize:22,marginBottom:10}}>{s.ic}</div>
                  <div style={{fontFamily:"'Libre Baskerville'",fontSize:24,color:'var(--gold2)'}}>{s.n}</div>
                  <div style={{fontSize:10,color:'var(--warm2)',textTransform:'uppercase',letterSpacing:'.08em',marginTop:4}}>{s.l}</div>
                </div>
              ))}
            </div>
            {purchases.length>0&&<div style={{marginBottom:28}}><div style={{fontFamily:"'Libre Baskerville'",fontSize:19,color:'var(--cream)',marginBottom:14}}>Recent Properties</div>{purchases.slice(0,3).map((p,i)=><PRow key={i} p={p}/>)}</div>}
            {bookings.length>0&&<div><div style={{fontFamily:"'Libre Baskerville'",fontSize:19,color:'var(--cream)',marginBottom:14}}>Recent Stays</div>{bookings.slice(0,3).map((b,i)=><BRow key={i} b={b}/>)}</div>}
          </div>
        )}
        {tab==='properties'&&<div>{purchases.length===0?<Empty ic="🏠" ti="No properties yet" su="Browse to start building equity." ct="Browse Properties" fn={()=>go('buy')}/>:purchases.map((p,i)=><PRow key={i} p={p}/>)}</div>}
        {tab==='bookings'&&<div>{bookings.length===0?<Empty ic="🌊" ti="No stays yet" su="Discover luxury short-term rentals." ct="Explore Stays" fn={()=>go('stays')}/>:bookings.map((b,i)=><BRow key={i} b={b}/>)}</div>}
      </div>
    </div>
  );
}
function Empty({ic,ti,su,ct,fn}){return(<div style={{textAlign:'center',padding:'60px 0'}}><div style={{fontSize:46,marginBottom:14}}>{ic}</div><div style={{fontFamily:"'Libre Baskerville'",fontSize:21,color:'var(--warm)',marginBottom:8}}>{ti}</div><div style={{fontSize:13,color:'var(--warm2)',marginBottom:22}}>{su}</div><button className="btn-gold" onClick={fn}>{ct} →</button></div>);}
function PRow({p}){return(<div style={{background:'var(--ink2)',border:'1px solid rgba(201,169,110,.1)',borderRadius:8,padding:'18px 22px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:14}}><div style={{display:'flex',gap:13,alignItems:'center'}}><div style={{fontSize:30}}>{p.property?.emoji||'🏠'}</div><div><div style={{fontFamily:"'DM Serif Display'",fontSize:15,color:'var(--cream)'}}>{p.property?.name}</div><div style={{fontSize:12,color:'var(--warm2)',marginTop:2}}>Purchased {p.date||'Recently'} · Owner Financed</div></div></div><div style={{display:'flex',gap:28,flexWrap:'wrap',alignItems:'center'}}><div><div style={{fontSize:9,color:'var(--warm2)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:3}}>Down Payment</div><div style={{fontFamily:"'JetBrains Mono'",fontSize:14,color:'var(--gold2)'}}>{fmtF(p.downPayment)}</div></div><div><div style={{fontSize:9,color:'var(--warm2)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:3}}>Monthly</div><div style={{fontFamily:"'JetBrains Mono'",fontSize:14,color:'#7DC89A'}}>{fmtM(p.monthly)}</div></div><span className="tag tgn">Active</span></div></div>);}
function BRow({b}){
  const fmt2=d=>{if(!d)return'—';try{return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return d;}};
  return(
    <div style={{background:'var(--ink2)',border:'1px solid rgba(201,169,110,.1)',borderRadius:8,padding:'18px 22px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:14}}>
      <div style={{display:'flex',gap:13,alignItems:'center'}}><div style={{fontSize:30}}>{b.stay?.emoji||'🏠'}</div><div><div style={{fontFamily:"'DM Serif Display'",fontSize:15,color:'var(--cream)'}}>{b.stay?.name}</div><div style={{fontSize:12,color:'var(--warm2)',marginTop:2}}>{b.checkIn&&b.checkOut?`${fmt2(b.checkIn)} – ${fmt2(b.checkOut)} · ${b.nights} nights`:`${b.nights} nights · ${b.stay?.beds}BR`}</div></div></div>
      <div style={{display:'flex',gap:28,flexWrap:'wrap',alignItems:'center'}}>
        <div><div style={{fontSize:9,color:'var(--warm2)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:3}}>Guests</div><div style={{fontFamily:"'JetBrains Mono'",fontSize:13,color:'var(--cream)'}}>{b.guests||b.stay?.guests||'—'}</div></div>
        <div><div style={{fontSize:9,color:'var(--warm2)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:3}}>Total Paid</div><div style={{fontFamily:"'JetBrains Mono'",fontSize:14,color:'var(--gold2)'}}>{fmtF(b.total)}</div></div>
        <span className="tag tgb">Confirmed</span>
      </div>
    </div>
  );
}

/* ── FOOTER ── */
function Footer({go}){
  return(
    <footer style={{background:'var(--ink)',borderTop:'1px solid rgba(201,169,110,.07)',padding:'52px 32px 32px'}}>
      <div style={{maxWidth:1280,margin:'0 auto'}}>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:36,marginBottom:44}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:14}}>
              <div style={{width:32,height:32,borderRadius:3,background:'linear-gradient(135deg,#C9A96E,#E8C98A)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'JetBrains Mono'",fontWeight:700,fontSize:9,color:INK}}>MAQ</div>
              <div style={{fontFamily:"'Libre Baskerville'",fontSize:15,color:'var(--cream)'}}>MAQ Group</div>
            </div>
            <p style={{fontSize:13,color:'var(--warm2)',lineHeight:1.7,maxWidth:280,marginBottom:18}}>Premier real estate investment and management company. Owner financing available — no bank required.</p>
            <div style={{fontSize:12,color:'var(--warm)'}}>📞 (561) 392-4800<br/><span style={{fontSize:11,color:'var(--warm2)'}}>www.maqgroupusa.com</span></div>
          </div>
          {[
            {ti:'Properties',ls:[{l:'Vacant Land',k:'buy'},{l:'Residential',k:'buy'},{l:'Commercial',k:'buy'},{l:'For Lease',k:'buy'}]},
            {ti:'MAQ Stays',ls:[{l:'All Stays',k:'stays'},{l:'Oceanfront',k:'stays'},{l:'Villas',k:'stays'},{l:'Estates',k:'stays'}]},
            {ti:'Company',ls:[{l:'About MAQ',k:'home'},{l:'My Account',k:'dashboard'},{l:'Contact',k:'home'},{l:'Terms',k:'home'}]},
          ].map((col,i)=>(
            <div key={i}>
              <div style={{fontSize:10,color:'var(--gold)',textTransform:'uppercase',letterSpacing:'.12em',fontWeight:600,marginBottom:14}}>{col.ti}</div>
              <div style={{display:'flex',flexDirection:'column',gap:9}}>
                {col.ls.map((l,j)=>(
                  <button key={j} onClick={()=>go(l.k)} style={{background:'none',border:'none',color:'var(--warm2)',fontSize:13,cursor:'pointer',textAlign:'left',padding:0,transition:'color .2s'}}
                    onMouseEnter={e=>e.target.style.color='var(--gold)'} onMouseLeave={e=>e.target.style.color='var(--warm2)'}>{l.l}</button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div className="divr" style={{marginBottom:20}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <div style={{fontSize:11,color:'var(--warm2)'}}>© 2025 MAQ Group. All rights reserved. Boca Raton, FL.</div>
          <div style={{fontSize:11,color:'var(--warm2)'}}>Owner Financing Available · Not a licensed mortgage lender</div>
        </div>
      </div>
    </footer>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
